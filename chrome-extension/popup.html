<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Office Hub</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="popup-header">
        <div class="popup-logo">
          <span class="popup-logo-mark">⬡</span>
          <span class="popup-logo-text">Office Hub</span>
        </div>
        <label class="toggle">
          <input id="autoMode" type="checkbox" />
          <span class="toggle-track"></span>
          <span class="toggle-label">Auto</span>
        </label>
      </header>

      <section id="lastIngestionSection" class="last-ingestion hidden">
        <p id="lastStatus"></p>
        <a id="reviewLink" href="http://localhost:3000/documents" target="_blank">View in dashboard →</a>
      </section>

      <a class="open-dashboard" href="http://localhost:3000/documents" target="_blank">
        Open review queue →
      </a>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
